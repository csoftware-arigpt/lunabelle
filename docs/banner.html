<!doctype html><html><head><meta charset="utf-8">
<style>
@import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:1280px;height:400px;overflow:hidden;font-family:'Nunito',system-ui,'Segoe UI',sans-serif}
.banner{width:1280px;height:400px;position:relative;
  background:linear-gradient(135deg,#FF5FA0 0%,#E0317F 46%,#C026A0 100%);
  display:flex;align-items:center;gap:54px;padding:0 84px}
.blob{position:absolute;border-radius:50%;opacity:.28}
.b1{width:300px;height:300px;background:#FFD1E8;top:-90px;right:110px}
.b2{width:190px;height:190px;background:#C9A0FF;bottom:-70px;right:360px;opacity:.32}
.b3{width:150px;height:150px;background:#7FE9D2;top:36px;right:36px;opacity:.34}
.icon{width:208px;height:208px;border-radius:54px;flex:0 0 auto;position:relative;z-index:2;
  background:linear-gradient(135deg,#FF7DB0,#D81B8C);box-shadow:0 18px 44px rgba(80,0,40,.28);
  display:flex;align-items:center;justify-content:center}
.icon svg{width:104px;height:138px;filter:drop-shadow(0 6px 10px rgba(120,0,60,.25))}
.txt{position:relative;z-index:2;color:#fff}
.title{font-weight:900;font-size:110px;line-height:.98;letter-spacing:-2px;text-shadow:0 6px 18px rgba(90,0,45,.22)}
.title .em{font-size:74px}
.sub{font-weight:700;font-size:33px;margin-top:16px;opacity:.97}
.pills{margin-top:24px;display:flex;gap:12px}
.pill{background:rgba(255,255,255,.20);border:1.5px solid rgba(255,255,255,.45);color:#fff;
  font-weight:800;font-size:22px;padding:9px 20px;border-radius:999px}
</style></head>
<body>
<div class="banner">
  <div class="blob b1"></div><div class="blob b2"></div><div class="blob b3"></div>
  <div class="icon">
    <svg viewBox="0 0 24 24"><path fill="#fff" d="M12 3 C12 3 5.5 11 5.5 15 a6.5 6.5 0 1 0 13 0 C18.5 11 12 3 12 3 Z"/></svg>
  </div>
  <div class="txt">
    <div class="title">Lunabelle <span class="em">🌸</span></div>
    <div class="sub">Милый приватный трекер цикла · Material&nbsp;3 Expressive</div>
    <div class="pills"><span class="pill">🔒 Офлайн</span><span class="pill">💗 Прогнозы</span><span class="pill">🦄 Мило</span><span class="pill">RU · EN</span></div>
  </div>
</div>
</body></html>
